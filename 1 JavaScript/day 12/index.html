<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <input type="text" name="" id="input1">
    <br>
    <select name="" id="opr">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>
    <br>
    <input type="text" name="" id="input2">
    <br>
    <button onclick="calculate()">Calculate</button>
    <br>
    <input type="text" name="" id="output">
</body>
<script>

    var input1 = document.getElementById('input1');
    var opr = document.getElementById('opr');
    var input2 = document.getElementById('input2');
    var output = document.getElementById('output');

    function calculate() {
        // console.log(input1.value); // 10
        // console.log(opr.value); // /
        // console.log(input2.value);// 20
        // console.log(output.value); // 40
        if (opr.value == '+') {
            output.value = Number(input1.value) + Number(input2.value);
        } else if (opr.value == '-') {
            output.value = Number(input1.value) - Number(input2.value);
        } else if (opr.value == '*') {
            output.value = Number(input1.value) * Number(input2.value);
        } else if (opr.value == '/') {
            output.value = Number(input1.value) / Number(input2.value);
        } else {
            alert("Please select correct operator")
        }


    }



</script>

</html>
