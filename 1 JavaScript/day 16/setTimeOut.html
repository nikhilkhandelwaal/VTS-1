<script>

    // Scheduling Functions
    //      1. setTimeOut       => Do after some time
    //      2. setInterval      => Repeat after some time
    //      3. clearInterval    => Stop repeating       


    console.log('Hello everyone');

    setTimeout(
        function () {
            console.log("welcome to VTS");
        }, 2000
    )//  function, time

    setInterval(
        function () {
            console.log("Hello VTS");
        }, 2000
    )


</script>
