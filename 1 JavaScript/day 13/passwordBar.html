<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bar {
            height: 10px;
            border-radius: 5px;
            margin: 5px 0px;
            transition: 0.2s;
        }
    </style>
</head>

<body>
    <input type="text" onkeyup="checkPass()" id="input">
    <div class="bar"></div>
    <span class="status"></span>
</body>
<script>

    var inputBox = document.getElementById('input');
    var status = document.querySelector(".status");
    var bar = document.querySelector(".bar");
    console.log(bar.outerHTML);
    console.log(status.outerHTML);

    function checkPass() {
        console.log(status);
        if (inputBox.value.length <= 3) {
            status.innerText = 'Easy';
            bar.style.background = 'red';
            bar.style.width = '50px';
        } else if (inputBox.value.length <= 6) {
            status.innerText = 'Medium';
            bar.style.background = 'orange';
            bar.style.width = '100px';
        } else if (inputBox.value.length <= 9) {
            status.innerText = 'strong';
            bar.style.background = 'blue';
            bar.style.width = '150px';
        } else {
            status.innerText = 'very strong';
            bar.style.background = 'green';
            bar.style.width = '200px';
        }
    }

    /*
        <3 =>  easy, red color
        <6 =>  Medium, orange
        <9 =>  strong, blue
        >9 =>  very strong, green
    
    */



// addEventListener
// classList
</script>

</html>
