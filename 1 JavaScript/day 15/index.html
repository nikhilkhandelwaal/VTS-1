<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="main">
        <div class="container">
            <div class="addTodo">
                <input type="text" id="inputBox">
                <button id="add">Add ToDo</button>
            </div>
            <div class="viewTodo">
                <div>
                    <span>Hello</span>
                    <button onclick="deleteTodo(this)">Del</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script>

    var add = document.querySelector('#add');
    var inputBox = document.querySelector('#inputBox');
    var viewTodo = document.querySelector('.viewTodo');

    function addNewToDo() {
        viewTodo.innerHTML += `<div>
                                     <span>${inputBox.value}</span>
                                     <button onclick="deleteTodo(this)">Del</button>
                                </div>`
        inputBox.value = "";
    }

    add.addEventListener('click', addNewToDo);

    inputBox.addEventListener('keyup', function (event) {
        if (event.key == "Enter") {
            addNewToDo();
        }
    })

    function deleteTodo(item) {
        item.parentNode.remove();
        // console.log(item.parentNode);
    }


</script>


</html>
