<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        .main {
            width: 100vw;
            height: 100vh;
            background-color: lightblue;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clock {
            width: 600px;
            height: 400px;
            background-color: rgb(94, 164, 161);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .clock button {
            position: absolute;
            top: 100px;
            font-size: 20px;
            padding: 10px 15px;
            background-color: rgb(30, 118, 6);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
        }

        .clock h1 {
            font-size: 80px;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="clock">
            <button>12:00</button>
            <h1>10:00:00</h1>
        </div>
    </div>
</body>
<script>

    var currentTime = document.querySelector('.clock h1');

    function getCurrentTime() {

        var date = new Date();
        var hours = date.getHours();
        var mintue = date.getMinutes();
        var seconds = date.getSeconds();

        if (hours < 10) {
            hours = "0" + hours
        }
        if (mintue < 10) {
            mintue = "0" + mintue
        }
        if (seconds < 10) {
            seconds = "0" + seconds
        }

        currentTime.innerText = `${hours}:${mintue}:${seconds}`
    }
    getCurrentTime();

    setInterval(getCurrentTime, 1000);



</script>

</html>
