<script>

    var date = new Date();
    console.log(date);
    console.log(date.getDate()); // 1, 2,3,4,5
    console.log(date.getDay()); // Sun-0, Mon-1, Tue-2, Wed-3
    console.log(date.getFullYear());
    console.log(date.getMonth());
    console.log(date.getHours());
    console.log(date.getMinutes());
    console.log(date.getSeconds());
    console.log(date.getMilliseconds());
    console.log(date.getTime()); // 1 January 1970, 12:00 se current time tak k milliseconds



</script>
